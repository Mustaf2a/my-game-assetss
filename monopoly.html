<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>مونوبولي الاحترافية - النسخة العالمية</title>
    <style>
        :root {
            --p1-color: #ff4d4d;
            --p2-color: #3498db;
            --gold: #f1c40f;
            --bg-dark: #0a0a0a;
            --card-bg: #ffffff;
            --chance-orange: #f39c12;
            --community-blue: #3498db;
        }

        /* منع التحديد واللمس الافتراضي */
        * {
            -webkit-tap-highlight-color: transparent;
            user-select: none;
            -webkit-user-select: none;
            touch-action: manipulation;
        }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: var(--bg-dark);
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            overflow: hidden; font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            /* منع السحب لأسفل لتحديث الصفحة في الموبايل */
            overscroll-behavior-y: contain;
        }

        /* البروفايلات - تم تصغيرها */
        .profile {
            position: absolute; top: 10px; width: 85px; padding: 6px;
            border-radius: 10px; background: rgba(255, 255, 255, 0.07);
            backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1);
            text-align: center; color: white; z-index: 2000; transition: 0.3s;
        }
        @keyframes pulse-active {
            0% { box-shadow: 0 0 0 0 rgba(241, 196, 15, 0.7); transform: scale(1); }
            70% { box-shadow: 0 0 0 10px rgba(241, 196, 15, 0); transform: scale(1.03); }
            100% { box-shadow: 0 0 0 0 rgba(241, 196, 15, 0); transform: scale(1); }
        }
        .profile.active { border-color: var(--gold); animation: pulse-active 2s infinite; }
        .profile-right { right: 10px; }
        .profile-left { left: 10px; }
        .avatar { width: 30px; height: 30px; border-radius: 50%; margin: 0 auto 3px; display: flex; align-items: center; justify-content: center; font-size: 16px; }
        .p1-avatar { background: var(--p1-color); }
        .p2-avatar { background: var(--p2-color); }
        .username { font-size: 12px; display: block; margin-bottom: 2px; }
        .balance { color: #2ecc71; font-size: 13px; font-weight: bold; }
        .timer-bar { width: 100%; height: 3px; background: rgba(255,255,255,0.1); margin-top: 5px; border-radius: 2px; }
        .timer-progress { width: 100%; height: 100%; background: var(--gold); transition: width 1s linear; }

        /* اللوحة */
        .board-container {
            position: relative; display: inline-block;
            max-width: 80vw; max-height: 70vh; margin: 10px 0;
            box-shadow: 0 0 50px rgba(0,0,0,0.9); border: 2px solid #333;
        }
        .board-image { display: block; max-width: 80vw; max-height: 70vh; object-fit: contain; }

        /* البيادق */
        .pawn { position: absolute; width: 3.2%; height: 5.2%; z-index: 100; transform: translate(-50%, -50%); transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); filter: drop-shadow(0 2px 4px black); }
        .pawn.moving { transform: translate(-50%, -120%) scale(1.5); z-index: 500; }
        .pawn .head { width: 100%; height: 40%; border-radius: 50%; background: inherit; border: 1px solid rgba(255,255,255,0.3); }
        .pawn .body { width: 120%; height: 60%; clip-path: polygon(20% 0%, 80% 0%, 100% 100%, 0% 100%); margin-left: -10%; background: inherit; opacity: 0.9; }
        #pawn-1 { background: var(--p1-color); }
        #pawn-2 { background: var(--p2-color); }

        /* شريط الملكية */
        .owner-tag {
            position: absolute; width: 20px; height: 9px; 
            border-radius: 2px; transform: translate(-30%, -30%);
            box-shadow: 0 0 3px rgba(0,0,0,0.5); z-index: 50;
            border: 1px solid rgba(255,255,255,0.4);
            transition: 0.3s; display: flex; align-items: center; justify-content: center;
            font-size: 5px; color: white; font-weight: bold; pointer-events: none;
        }

        /* تصميم بطاقة الملكية المطور */
        #property-card {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0);
            width: 280px; background: var(--card-bg); border-radius: 15px;
            z-index: 3000; padding: 0; text-align: center; color: #1a1a1a;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5); transition: 0.4s cubic-bezier(0.18, 0.89, 0.32, 1.28);
            border: 1px solid #ddd; overflow: hidden;
        }
        #property-card.show { transform: translate(-50%, -50%) scale(1); }
        
        .close-card {
            position: absolute; top: 5px; right: 10px; font-size: 24px; 
            color: white; cursor: pointer; font-weight: bold; z-index: 10;
        }

        .card-banner { height: 60px; display: flex; align-items: center; justify-content: center; color: white; font-weight: bold; font-size: 18px; text-shadow: 1px 1px 2px rgba(0,0,0,0.5); }
        
        .card-content { padding: 20px; background: white; min-height: 100px; display: flex; flex-direction: column; justify-content: center; }
        .property-title { font-size: 20px; margin: 0 0 10px 0; color: #2c3e50; font-weight: 800; }
        
        .rent-row { display: flex; justify-content: space-between; font-size: 13px; padding: 3px 0; border-bottom: 1px solid #eee; }
        .rent-row.main { font-weight: bold; font-size: 15px; border-bottom: 2px solid #333; margin-bottom: 5px; }
        
        .card-footer { padding: 15px; background: #f9f9f9; display: flex; gap: 10px; justify-content: center; border-top: 1px solid #eee; }
        
        /* أزرار البطاقة */
        .btn-buy { background: #2ecc71; color: white; padding: 8px 20px; border-radius: 20px; border: none; font-weight: bold; cursor: pointer; transition: 0.2s; flex: 1; }
        .btn-cancel { background: #e74c3c; color: white; padding: 8px 20px; border-radius: 20px; border: none; font-weight: bold; cursor: pointer; transition: 0.2s; flex: 1; }
        .btn-action { background: #34495e; color: white; padding: 10px 30px; border-radius: 20px; border: none; font-weight: bold; cursor: pointer; transition: 0.2s; }

        /* واجهة النرد */
        .dice-container { display: flex; gap: 15px; margin-bottom: 10px; }
        .dice {
            width: 55px; height: 55px; background: white; border-radius: 12px;
            display: flex; justify-content: center; align-items: center;
            font-size: 28px; font-weight: bold; color: #333;
            box-shadow: 0 6px 0 #ddd, 0 10px 15px rgba(0,0,0,0.3);
            transition: 0.1s;
        }
        .dice.rolling { animation: shake 0.15s infinite; background: #eee; }
        @keyframes shake { 0% { transform: translate(2px, 1px) rotate(0deg); } 50% { transform: translate(-1px, -2px) rotate(-5deg); } 100% { transform: translate(1px, 2px) rotate(5deg); } }

        .controls { display: flex; flex-direction: column; align-items: center; }
        #roll-btn { padding: 12px 50px; font-size: 20px; font-weight: bold; cursor: pointer; background: var(--gold); border: none; border-radius: 35px; box-shadow: 0 4px 15px rgba(241, 196, 15, 0.4); }
        #roll-btn:disabled { opacity: 0.5; cursor: not-allowed; background: #999; box-shadow: none; }
    </style>
</head>

    function enableRollBtn() {
        document.getElementById('roll-btn').disabled = false;
    }

    function disableRollBtn() {
        document.getElementById('roll-btn').disabled = true;
    }

    function updateBalances() {
        players.forEach(p => {
            document.getElementById(`balance-${p.id}`).innerText = `$${p.balance}`;
        });
    }

    function setPawnPosition(player) {
        const coords = centers[player.pos];
        player.element.style.left = (coords.x + player.offset.x) + "%";
        player.element.style.top = (coords.y + player.offset.y) + "%";
    }

    function hideCard() {
        document.getElementById('property-card').classList.remove('show');
    }

    function hideCardAndSwitch() {
        hideCard();
        setTimeout(() => { 
            if(!isMoving) {
                if(lastRollWasDouble && !players[currentPlayerIndex].inJail) {
                    startTimer();
                    enableRollBtn();
                } else {
                    switchTurn();
                }
            }
        }, 500);
    }

    function actionBuy() {
        const player = players[currentPlayerIndex];
        const data = propertyData[player.pos];
        if (player.balance >= data.price) {
            player.balance -= data.price;
            data.owner = player.id;
            updateBalances();
            addOwnerTag(player.pos, player.color);
            alert(`تم شراء ${data.name} بنجاح!`);
            hideCard();
            if (!lastRollWasDouble) switchTurn();
            else { startTimer(); enableRollBtn(); }
        } else {
            alert("لا تملك رصيد كافٍ!");

    }

    function addOwnerTag(pos, color) {
        const board = document.getElementById('main-board');
        const tag = document.createElement('div');
        tag.className = 'owner-tag';
        tag.style.left = centers[pos].x + "%";
        tag.style.top = (centers[pos].y - 3) + "%";
        tag.style.backgroundColor = color;
        tag.innerText = "مملوكة";
        board.appendChild(tag);
    }

    function executeSpecialCard(type) {
        const cardArray = type === 'chance' ? chanceCards : communityCards;
        const randomCard = cardArray[Math.floor(Math.random() * cardArray.length)];
        document.getElementById('card-body').innerHTML = `<p style="font-size:18px; line-height:1.5;">${randomCard.text}</p>`;
        document.getElementById('card-actions').innerHTML = `<button class="btn-action" onclick="applyEffect('${type}', ${cardArray.indexOf(randomCard)})">موافق</button>`;
    }

    function applyEffect(type, index) {
        const player = players[currentPlayerIndex];
        const cardArray = type === 'chance' ? chanceCards : communityCards;
        const card = cardArray[index];
        card.action(player);
        updateBalances();
        setPawnPosition(player);
        hideCard();
        
        if (player.inJail) {
            switchTurn();
        } else {
            if (!lastRollWasDouble) switchTurn();
            else { startTimer(); enableRollBtn(); }
        }
    }

    function sendToJail(player) {
        player.pos = 10;
        player.inJail = true;
        player.jailTurns = 0;
        player.doublesCount = 0;
        setPawnPosition(player);
        alert("لقد تم إرسالك إلى السجن!");
        disableRollBtn();
    }

    function payJailFine() {
        const player = players[currentPlayerIndex];
        if (player.balance >= 50) {
            player.balance -= 50;
            player.inJail = false;
            player.jailTurns = 0;
            updateBalances();
            alert("دفعت 50$ وخرجت من السجن! يمكنك اللعب في الدور القادم.");
            hideCard();
            switchTurn();

            alert("لا تملك 50$ لدفع الغرامة!");
        }
    }

    function checkFullSet(color, ownerId) {
        if (!color || color === "#333") return false; 
        const propertiesOfSameColor = Object.values(propertyData).filter(p => p.color === color);
        return propertiesOfSameColor.every(p => p.owner === ownerId);
    }

    function showPropertyCard(pos) {
        const data = propertyData[pos];
        const card = document.getElementById('property-card');
        const banner = document.getElementById('card-color');
        const actions = document.getElementById('card-actions');
        const player = players[currentPlayerIndex];
        
        if (!data) { 
            if (!lastRollWasDouble) switchTurn(); 
            else { startTimer(); enableRollBtn(); }
            return; 
        }
        
        startTimer(); 

        if (data.type === 'go_to_jail') {
            banner.style.backgroundColor = "#000";
            banner.innerText = "الشرطة";
            document.getElementById('card-name').innerText = "اذهب إلى السجن!";
            document.getElementById('card-body').innerHTML = `<p>انتقل مباشرة إلى السجن، لا تمر بنقطة البداية ولا تقبض 200$.</p>`;
            actions.innerHTML = `<button class="btn-action" onclick="confirmJail()">موافق</button>`;
        } else if (data.type === 'tax') {
            banner.style.backgroundColor = "#2c3e50";
            banner.innerText = "وزارة المالية";
            document.getElementById('card-name').innerText = data.name;
            document.getElementById('card-body').innerHTML = `
                <p style="font-size:18px; color:#e74c3c; font-weight:bold;">
                    تم فرض ضريبة للحكومة!<br>القيمة: $${data.amount}
                </p>
            `;
            player.balance -= data.amount;
            updateBalances();
            actions.innerHTML = `<button class="btn-action" onclick="finishAction()">دفع الضريبة</button>`;
        } else if (data.type === 'chance' || data.type === 'community') {
            banner.style.backgroundColor = data.type === 'chance' ? 'var(--chance-orange)' : 'var(--community-blue)';
            banner.innerText = data.type === 'chance' ? 'فرصة' : 'صندوق الجماعة';
            document.getElementById('card-name').innerText = "اسحب بطاقة";
            executeSpecialCard(data.type);
        } else if (data.type === 'special') {
            banner.style.backgroundColor = "#333";
            banner.innerText = "منطقة خاصة";
            document.getElementById('card-name').innerText = data.name;
            document.getElementById('card-body').innerHTML = `<p>${data.desc}</p>`;
            actions.innerHTML = `<button class="btn-action" onclick="finishAction()">موافق</button>`;
        } else {
            if (data.owner && data.owner !== player.id) {
                const ownerPlayer = players.find(p => p.id === data.owner);
                let finalRent = data.rent;
                let rentMessage = "";

                if (data.type === 'station') {
                    const stationsOwned = Object.values(propertyData).filter(p => p.type === 'station' && p.owner === data.owner).length;
                    finalRent = 25 * Math.pow(2, stationsOwned - 1);
                    rentMessage = `<p style="color:#e74c3c; font-weight:bold;">المالك يمتلك ${stationsOwned} محطات.<br>الإيجار المطلوب: $${finalRent}</p>`;
                } 
                else if (data.type === 'utility') {
                    const utilitiesOwned = Object.values(propertyData).filter(p => p.type === 'utility' && p.owner === data.owner).length;
                    const multiplier = utilitiesOwned === 2 ? 10 : 4;
                    finalRent = lastDiceSum * multiplier;
                    rentMessage = `<p style="color:#e74c3c; font-weight:bold;">المالك يمتلك ${utilitiesOwned} من الخدمات.<br>الإيجار (${multiplier} × مجموع النرد): $${finalRent}</p>`;
                }
                else {
                    let isFullSet = checkFullSet(data.color, data.owner);
                    if (isFullSet) finalRent = data.rent * 2;
                    rentMessage = `<p style="color:#e74c3c; font-weight:bold;">هذه الأرض مملوكة لـ لاعب ${ownerPlayer.id}!<br>`;
                    if (isFullSet) rentMessage += `إيجار مضاعف ($${finalRent}) لامتلاك كامل المجموعة!</p>`;
                    else rentMessage += `لقد دفعت إيجاراً قيمته $${finalRent}</p>`;
                }

                player.balance -= finalRent;
                ownerPlayer.balance += finalRent;
                updateBalances();
                
                banner.style.backgroundColor = "#e74c3c";
                banner.innerText = "دفع إيجار";
                document.getElementById('card-name').innerText = data.name;
                document.getElementById('card-body').innerHTML = rentMessage;
                actions.innerHTML = `<button class="btn-action" onclick="finishAction()">متابعة</button>`;
            } else {
                banner.style.backgroundColor = data.color || '#333';
                banner.innerText = data.owner === player.id ? "ملكيتك" : "سند ملكية";
                document.getElementById('card-name').innerText = data.name;
                
                if (data.type === 'station') {
                    document.getElementById('card-body').innerHTML = `
                        <div class="rent-row"><span>إيجار محطة واحدة</span> <span>$25</span></div>
                        <div class="rent-row"><span>إيجار محطتين</span> <span>$50</span></div>
                        <div class="rent-row"><span>إيجار 3 محطات</span> <span>$100</span></div>
                        <div class="rent-row"><span>إيجار 4 محطات</span> <span>$200</span></div>
                        <div style="font-size: 11px; color: #7f8c8d; margin-top: 10px;">سعر الشراء: <b>$200</b></div>
                    `;
                } else if (data.type === 'utility') {
                    document.getElementById('card-body').innerHTML = `
                        <p style="font-size:12px;">إذا كان اللاعب يمتلك مرفقاً واحداً، الإيجار 4 أضعاف النرد.</p>
                        <p style="font-size:12px;">إذا كان يمتلك المرفقين، الإيجار 10 أضعاف النرد.</p>
                        <div style="font-size: 11px; color: #7f8c8d; margin-top: 10px;">سعر الشراء: <b>$150</b></div>
                    `;
                } else {
                    document.getElementById('card-body').innerHTML = `
                        <div class="rent-row main"><span>الإيجار</span> <span>$${data.rent}</span></div>
                        <div class="rent-row"><span>مع بيت واحد</span> <span>$${data.h1}</span></div>
                        <div class="rent-row"><span>مع بيتين</span> <span>$${data.h2}</span></div>
                        <div class="rent-row"><span>مع 3 بيوت</span> <span>$${data.h3}</span></div>
                        <div class="rent-row"><span>مع 4 بيوت</span> <span>$${data.h4}</span></div>
                        <div class="rent-row main"><span>مع فندق</span> <span>$${data.hotel}</span></div>
                        <div style="font-size: 11px; color: #7f8c8d; margin-top: 10px;">
                            تكلفة بناء البيت $${data.build}<br>
                            سعر الشراء: <b>$${data.price}</b>
                        </div>
                    `;
                }

                if (data.owner === player.id) {
                    actions.innerHTML = `<button class="btn-action" onclick="finishAction()">أنت المالك</button>`;
                } else {
                    actions.innerHTML = `
                        <button class="btn-buy" onclick="actionBuy()">شراء</button>
                        <button class="btn-cancel" onclick="finishAction()">إلغاء</button>
                    `;
                }
            }
        }
        card.classList.add('show');
    }

    function confirmJail() {
        sendToJail(players[currentPlayerIndex]);
        hideCard();
        switchTurn();
    }

    function finishAction() {
        hideCard();
        if (!lastRollWasDouble) switchTurn();
        else { startTimer(); enableRollBtn(); }
    }

    async function handleRoll() {
        if (isMoving || document.getElementById('roll-btn').disabled) return;
        
        disableRollBtn();
        let player = players[currentPlayerIndex];

        diceSound.currentTime = 0;
        diceSound.play().catch(e => console.log("Audio play error:", e));

        if (player.inJail) {
            clearInterval(timerInterval);
            const d1 = Math.floor(Math.random() * 6) + 1;
            const d2 = Math.floor(Math.random() * 6) + 1;
            
            document.getElementById('dice-1').innerText = ['⚀', '⚁', '⚂', '⚃', '⚄', '⚅'][d1-1];
            document.getElementById('dice-2').innerText = ['⚀', '⚁', '⚂', '⚃', '⚄', '⚅'][d2-1];

            if (d1 === d2) {
                player.inJail = false;
                player.jailTurns = 0;
                document.getElementById('doubles-indicator').innerText = "رمية مزدوجة! اخرج من السجن وتحرك";
                lastDiceSum = d1 + d2;
                movePawn(lastDiceSum);
            } else {
                player.jailTurns++;
                if (player.jailTurns >= 3) {
                    alert("لقد قضيت 3 أدوار! يجب دفع 50$ للخروج.");
                    showJailOptions();
                } else {
                    alert(`لم تحصل على رمية مزدوجة. المحاولة ${player.jailTurns} من 3`);
                    switchTurn();
                }
            }
            return;
        }

        isMoving = true;
        clearInterval(timerInterval);
        hideCard();
        document.getElementById('doubles-indicator').innerText = "";

        const d1Ele = document.getElementById('dice-1');
        const d2Ele = document.getElementById('dice-2');
        d1Ele.classList.add('rolling');
        d2Ele.classList.add('rolling');

        await new Promise(r => setTimeout(r, 800));

        const d1 = Math.floor(Math.random() * 6) + 1;
        const d2 = Math.floor(Math.random() * 6) + 1;
        lastDiceSum = d1 + d2;
        const diceIcons = ['⚀', '⚁', '⚂', '⚃', '⚄', '⚅'];
        d1Ele.innerText = diceIcons[d1-1];
        d2Ele.innerText = diceIcons[d2-1];
        d1Ele.classList.remove('rolling');
        d2Ele.classList.remove('rolling');

        if (d1 === d2) {
            player.doublesCount++;
            lastRollWasDouble = true;
            if (player.doublesCount === 3) {
                document.getElementById('doubles-indicator').innerText = "سرعة زائدة! اذهب للسجن";
                sendToJail(player);
                isMoving = false;
                setTimeout(switchTurn, 1000);
                return;
            } else {
                document.getElementById('doubles-indicator').innerText = `رمية مزدوجة! العب مرة أخرى (${player.doublesCount})`;
            }
        } else {
            player.doublesCount = 0;
            lastRollWasDouble = false;
        }

        movePawn(lastDiceSum);
    }

    async function movePawn(steps) {
        isMoving = true;
        let player = players[currentPlayerIndex];
        player.element.classList.add('moving');

        for (let i = 0; i < steps; i++) {
            player.pos = (player.pos + 1) % 40;
            setPawnPosition(player);
            if (player.pos === 0) {
                player.balance += 200;
                updateBalances();
            }
            await new Promise(r => setTimeout(r, 300));
        }

        player.element.classList.remove('moving');
        isMoving = false;
        showPropertyCard(player.pos);
    }

    function showJailOptions() {
        const card = document.getElementById('property-card');
        const banner = document.getElementById('card-color');
        const actions = document.getElementById('card-actions');
        
        banner.style.backgroundColor = "#000";
        banner.innerText = "قوانين السجن";
        document.getElementById('card-name').innerText = "خروج إجباري";
        document.getElementById('card-body').innerHTML = `<p>يجب دفع 50$ غرامة للخروج بعد 3 محاولات فاشلة.</p>`;
        actions.innerHTML = `<button class="btn-buy" onclick="payJailFine()">دفع 50$</button>`;
        card.classList.add('show');
    }

    function switchTurn() {
        players[currentPlayerIndex].profile.classList.remove('active');
        players[currentPlayerIndex].timerBar.style.width = "100%";
        
        currentPlayerIndex = (currentPlayerIndex + 1) % players.length;
        
        players[currentPlayerIndex].profile.classList.add('active');
        document.getElementById('turn-indicator').innerText = `دور اللاعب ${players[currentPlayerIndex].id}`;
        document.getElementById('doubles-indicator').innerText = "";
        lastRollWasDouble = false;
        enableRollBtn();
        startTimer();
    }

    function startTimer() {
        clearInterval(timerInterval);
        timeLeft = 15;
        timerInterval = setInterval(() => {
            if (isMoving) return;
            
            timeLeft--;
            const p = players[currentPlayerIndex];
            p.timerBar.style.width = (timeLeft / 15 * 100) + "%";
            
            if (timeLeft <= 0) {
                clearInterval(timerInterval);
                if (document.getElementById('property-card').classList.contains('show')) {
                    hideCard();
                    setTimeout(switchTurn, 500);
                } else {
                    switchTurn();
                }
            }
        }, 1000);
    }

    window.onload = () => {
        players.forEach(setPawnPosition);
        enableRollBtn();
        startTimer();
    };
</script>
<script src="game-logic.js"></script>

</body>
