<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مونوبولي برو - نظام الحظ والفرصة</title>
    <style>
        /* خلفية أنيميشن متدرجة */
        body { 
            margin: 0; background: linear-gradient(-45deg, #0f2027, #203a43, #2c5364);
            background-size: 400% 400%; animation: gradientBG 15s ease infinite;
            color: white; font-family: 'Segoe UI', sans-serif; 
            display: flex; flex-direction: column; align-items: center; 
            height: 100vh; overflow: hidden; 
        }
        @keyframes gradientBG { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }

        #game-view { 
            width: 95%; height: 60vh; margin-top: 10px; position: relative; 
            background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px);
            border-radius: 20px; display: flex; justify-content: center; align-items: center; 
            border: 1px solid rgba(255, 255, 255, 0.1); box-shadow: 0 8px 32px rgba(0,0,0,0.5);
        }

        /* تصميم البطاقة المنبثقة (الأملاك) */
        #property-card {
            position: absolute; width: 230px; background: white; color: #333;
            border-radius: 10px; box-shadow: 0 10px 40px rgba(0,0,0,0.8);
            display: none; flex-direction: column; align-items: center;
            z-index: 200; animation: popIn 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            overflow: hidden; border: 2px solid #333;
        }

        /* تصميم بطاقة الفرصة والحظ (تصميم مختلف ومميز) */
        #chance-card {
            position: absolute; width: 250px; height: 160px; background: #ff7f50; color: white;
            border-radius: 15px; box-shadow: 0 10px 40px rgba(0,0,0,0.8);
            display: none; flex-direction: column; align-items: center; justify-content: center;
            z-index: 210; animation: chancePop 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: 5px solid white; text-align: center; padding: 15px;
        }
        @keyframes chancePop { from { transform: scale(0) rotate(-20deg); } to { transform: scale(1) rotate(0); } }

        .card-header { 
            width: 90%; height: 45px; margin-top: 8px; border: 2px solid #333; 
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            font-size: 11px; font-weight: bold; text-transform: uppercase;
        }
        .card-header span { font-size: 16px; display: block; }
        .card-body { padding: 10px; text-align: center; width: 100%; box-sizing: border-box; }
        .rent-list { width: 100%; font-size: 13px; border-collapse: collapse; margin-top: 5px; }
        .rent-list td { padding: 3px 0; border-bottom: 1px solid #eee; }
        .rent-list td:last-child { font-weight: bold; text-align: left; padding-left: 10px; }
        .rent-list td:first-child { text-align: right; padding-right: 10px; }
        .hotel-row { color: #e74c3c; font-weight: bold; }

        /* أزرار التحكم */
        .controls-panel { height: 40vh; width: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 15px; }
        .dice-container { display: flex; gap: 20px; }
        .dice { width: 60px; height: 60px; background: white; color: #1a1a1a; border-radius: 12px; display: flex; justify-content: center; align-items: center; font-size: 30px; font-weight: bold; box-shadow: 0 5px 15px rgba(0,0,0,0.3); border: 1px solid #ddd; }
        .dice.rolling { animation: shake 0.4s infinite; }
        @keyframes shake { 0%, 100% { transform: rotate(0); } 25% { transform: rotate(10deg); } 75% { transform: rotate(-10deg); } }

        .btn-play { padding: 15px 60px; font-size: 22px; background: linear-gradient(45deg, #27ae60, #2ecc71); color: white; border: none; border-radius: 50px; cursor: pointer; font-weight: bold; box-shadow: 0 4px 15px rgba(39, 174, 96, 0.4); }
        #status-bar { color: #f1c40f; font-weight: bold; background: rgba(0,0,0,0.4); padding: 5px 20px; border-radius: 20px; font-size: 14px; }
        
        .chance-title { font-size: 24px; font-weight: bold; margin-bottom: 10px; text-decoration: underline; }
        .chance-text { font-size: 16px; line-height: 1.4; }
    </style>
</head>
<body>

    <div id="game-view">
        <div id="property-card">
            <div id="card-color" class="card-header">صك ملكية <span id="card-name">اسم المنطقة</span></div>
            <div class="card-body">
                <table class="rent-list">
                    <tr><td>الإيجار أرض فضاء</td><td id="r0">$2</td></tr>
                    <tr><td>مع بيت واحد</td><td id="r1">$10</td></tr>
                    <tr><td>مع بيتـين</td><td id="r2">$30</td></tr>
                    <tr><td>مع 3 بيوت</td><td id="r3">$90</td></tr>
                    <tr><td>مع 4 بيوت</td><td id="r4">$160</td></tr>
                    <tr class="hotel-row"><td>مع فـنـدق</td><td id="rh">$250</td></tr>
                </table>
                <div style="font-size: 12px; font-weight: bold; margin-top: 8px;">سعر الشراء: <span id="card-price" style="color: #27ae60;">$60</span></div>
            </div>
        </div>

        <div id="chance-card">
            <div id="chance-type" class="chance-title">فرصة</div>
            <div id="chance-desc" class="chance-text">تقدم إلى "مايفير" فوراً!</div>
        </div>

        <div id="loading">جاري تحميل أصول اللعبة...</div>
    </div>

    <div class="controls-panel">
        <div class="dice-container">
            <div id="dice1" class="dice">🎲</div>
            <div id="dice2" class="dice">🎲</div>
        </div>
        <button class="btn-play" id="roll-button" onclick="playTurn()">ارمي النرد</button>
        <div id="status-bar">جاهز للعب</div>
    </div>

<script>
    const FILE_URL = 'https://raw.githubusercontent.com/Mustaf2a/my-game-assetss/main/monopoly.html';
    let gameCenters = [];
    let currentPos = 0;
    let isMoving = false;
    let doubleCount = 0; // عداد رميات الدبل المتتالية

    // مصفوفة بطاقات الفرصة
    const chanceCards = [
        "تقدم إلى 'انطلق' (Go) واجمع 200$",
        "تقدم إلى 'بيكاديللي'",
        "تقدم إلى 'طريق بال مال'",
        "البنك يدفع لك أرباحاً قدرها 50$",
        "لقد فزت في مسابقة الكلمات المتقاطعة، اجمع 100$",
        "اخرج من السجن مجاناً (احتفظ بهذه البطاقة)",
        "اذهب إلى السجن فوراً! لا تمر بمربع انطلق",
        "لقد تجاوزت السرعة، ادفع غرامة 15$",
        "تقدم إلى محطة كينغز كروس",
        "خطأ في الحسابات المصرفية لصالحك، اجمع 200$",
        "رسوم الطبيب، ادفع 50$",
        "من بيع أسهمك ستحصل على 50$",
        "عيد ميلادك! اجمع 10$ من كل لاعب",
        "تأمين المستشفى، ادفع 100$",
        "ادفع ضريبة المدرسة قدرها 150$"
    ];

    // مصفوفة بطاقات صندوق الجماعة (Community Chest)
    const communityChestCards = [
        "تقدم إلى مربع 'البداية' واقبض 200$",
        "خطأ في الحسابات المصرفية لمصلحتك، اقبض 200$",
        "أتعاب الطبيب، ادفع 50$",
        "من بيع أسهمك ستحصل على 50$",
        "بطاقة الخروج من السجن مجاناً (احتفظ بها)",
        "اذهب إلى السجن فوراً! لا تمر بمربع البداية",
        "صندوق التقاعد الخاص بك استحق، اقبض 100$",
        "عائدات ضريبة الدخل، اقبض 20$",
        "لقد حان موعد التأمين على الحياة، اقبض 100$",
        "ادفع رسوم المستشفى وقدرها 100$",
        "ادفع رسوم المدرسة وقدرها 150$",
        "أتعاب الاستشارة، اقبض 25$",
        "لقد فزت بالمرتبة الثانية في مسابقة الجمال، اقبض 10$",
        "لقد ورثت مبلغ 100$",
        "صندوق الجماعة: اجمع 50$ من كل لاعب لتغطية تكاليف الحفل"
    ];

    const propertyData = [
        { name: "البداية", color: "#2ecc71", price: 0, rents: [0,0,0,0,0,0], isSpecial: true },
        { name: "طريق أولد كينت", color: "#8b4513", price: 60, rents: [2, 10, 30, 90, 160, 250] },
        { name: "صندوق الجماعة", color: "#ffffff", price: 0, rents: [0,0,0,0,0,0], isChance: true },
        { name: "طريق وايت تشابل", color: "#8b4513", price: 60, rents: [4, 20, 60, 180, 320, 450] },
        { name: "ضريبة الدخل", color: "#bdc3c7", price: 200, rents: [0,0,0,0,0,0], isSpecial: true },
        { name: "محطة كينغز كروس", color: "#000000", price: 200, rents: [25, 50, 100, 200, 0, 0] },
        { name: "ذا أنجل، إزلينغتون", color: "#aae0fa", price: 100, rents: [6, 30, 90, 270, 400, 550] },
        { name: "فرصة", color: "#ffffff", price: 0, rents: [0,0,0,0,0,0], isChance: true },
        { name: "طريق يوستون", color: "#aae0fa", price: 100, rents: [6, 30, 90, 270, 400, 550] },
        { name: "طريق بينتونفيل", color: "#aae0fa", price: 120, rents: [8, 40, 100, 300, 450, 600] },
        { name: "السجن", color: "#7f8c8d", price: 0, rents: [0,0,0,0,0,0], isSpecial: true },
        { name: "بال مال", color: "#d93a96", price: 140, rents: [10, 50, 150, 450, 625, 750] },
        { name: "شركة الكهرباء", color: "#f39c12", price: 150, rents: [0,0,0,0,0,0] },
        { name: "وينهول", color: "#d93a96", price: 140, rents: [10, 50, 150, 450, 625, 750] },
        { name: "شارع نورثمبرلاند", color: "#d93a96", price: 160, rents: [12, 60, 180, 500, 700, 900] },
        { name: "محطة ماريلبون", color: "#000000", price: 200, rents: [25, 50, 100, 200, 0, 0] },
        { name: "شارع باو", color: "#f7941d", price: 180, rents: [14, 70, 200, 550, 750, 950] },
        { name: "صندوق الجماعة", color: "#ffffff", price: 0, rents: [0,0,0,0,0,0], isChance: true },
        { name: "شارع مارلبورو", color: "#f7941d", price: 180, rents: [14, 70, 200, 550, 750, 950] },
        { name: "شارع فاين", color: "#f7941d", price: 200, rents: [16, 80, 220, 600, 800, 1000] },
        { name: "موقف مجاني", color: "#27ae60", price: 0, rents: [0,0,0,0,0,0], isSpecial: true },
        { name: "ذا ستراند", color: "#ed1b24", price: 220, rents: [18, 90, 250, 700, 875, 1050] },
        { name: "فرصة", color: "#ffffff", price: 0, rents: [0,0,0,0,0,0], isChance: true },
        { name: "شارع فليت", color: "#ed1b24", price: 220, rents: [18, 90, 250, 700, 875, 1050] },
        { name: "شارع ترافلغار", color: "#ed1b24", price: 240, rents: [20, 100, 300, 750, 925, 1100] },
        { name: "محطة فينشرش", color: "#000000", price: 200, rents: [25, 50, 100, 200, 0, 0] },
        { name: "ليستر سكوير", color: "#fef200", price: 260, rents: [22, 110, 330, 800, 975, 1150] },
        { name: "شارع كوفنتري", color: "#fef200", price: 260, rents: [22, 110, 330, 800, 975, 1150] },
        { name: "شركة المياه", color: "#3498db", price: 150, rents: [0,0,0,0,0,0] },
        { name: "بيكاديللي", color: "#fef200", price: 280, rents: [24, 120, 360, 850, 1025, 1200] },
        { name: "اذهب للسجن", color: "#c0392b", price: 0, rents: [0,0,0,0,0,0], isSpecial: true },
        { name: "شارع ريجنت", color: "#1fb25a", price: 300, rents: [26, 130, 390, 900, 1100, 1275] },
        { name: "شارع أكسفورد", color: "#1fb25a", price: 300, rents: [26, 130, 390, 900, 1100, 1275] },
        { name: "صندوق الجماعة", color: "#ffffff", price: 0, rents: [0,0,0,0,0,0], isChance: true },
        { name: "شارع بوند", color: "#1fb25a", price: 320, rents: [28, 150, 450, 1000, 1200, 1400] },
        { name: "محطة ليفربول", color: "#000000", price: 200, rents: [25, 50, 100, 200, 0, 0] },
        { name: "فرصة", color: "#ffffff", price: 0, rents: [0,0,0,0,0,0], isChance: true },
        { name: "بارك لين", color: "#0072bb", price: 350, rents: [35, 175, 500, 1100, 1300, 1500] },
        { name: "ضريبة الرفاهية", color: "#bdc3c7", price: 100, rents: [0,0,0,0,0,0], isSpecial: true },
        { name: "مايفير", color: "#0072bb", price: 400, rents: [50, 200, 600, 1400, 1700, 2000] }
    ];

    async function loadRemoteGame() {
        try {
            const res = await fetch(FILE_URL);
            const content = await res.text();
            document.getElementById('game-view').innerHTML += content;
            document.getElementById('loading').style.display = 'none';
            const match = content.match(/const\s+centers\s*=\s*(\[[\s\S]*?\]);/);
            if (match) gameCenters = eval(match[1]);
            setTimeout(() => updatePawn(0), 500);
        } catch (err) { console.error(err); }
    }

    function updatePawn(idx) {
        const pawn = document.getElementById('player-pawn');
        if (pawn && gameCenters[idx]) {
            pawn.style.left = gameCenters[idx].x + "%";
            pawn.style.top = gameCenters[idx].y + "%";
        }
    }

    function showCard(idx) {
        const pCard = document.getElementById('property-card');
        const cCard = document.getElementById('chance-card');
        const data = propertyData[idx];

        pCard.style.display = 'none';
        cCard.style.display = 'none';

        if (data.isChance) {
            let randomMsg = "";
            if (data.name === "فرصة") {
                randomMsg = chanceCards[Math.floor(Math.random() * chanceCards.length)];
                cCard.style.background = "#ff7f50";
            } else {
                randomMsg = communityChestCards[Math.floor(Math.random() * communityChestCards.length)];
                cCard.style.background = "#1e90ff";
            }
            document.getElementById('chance-type').innerText = data.name;
            document.getElementById('chance-desc').innerText = randomMsg;
            cCard.style.display = 'flex';
        } else if (!data.isSpecial) {
            document.getElementById('card-color').style.background = data.color;
            document.getElementById('card-name').innerText = data.name;
            document.getElementById('card-price').innerText = "$" + data.price;
            for(let i=0; i<5; i++) document.getElementById('r'+i).innerText = "$" + data.rents[i];
            document.getElementById('rh').innerText = "$" + data.rents[5];
            pCard.style.display = 'flex';
        }
        
        // إذا توقف على خانة "اذهب إلى السجن"
        if (data.name === "اذهب للسجن") {
            setTimeout(() => {
                alert("توقفت على خانة اذهب للسجن! سيتم نقلك الآن.");
                currentPos = 10; // موقع السجن
                updatePawn(currentPos);
                doubleCount = 0; // تصفير العداد
            }, 500);
        }
    }

    async function playTurn() {
        if (isMoving) return;
        isMoving = true;
        
        document.getElementById('property-card').style.display = 'none';
        document.getElementById('chance-card').style.display = 'none';
        
        const r1 = Math.floor(Math.random() * 6) + 1;
        const r2 = Math.floor(Math.random() * 6) + 1;
        const isDouble = (r1 === r2);
        
        document.getElementById('dice1').classList.add('rolling');
        document.getElementById('dice2').classList.add('rolling');
        await new Promise(r => setTimeout(r, 800));
        
        document.getElementById('dice1').classList.remove('rolling');
        document.getElementById('dice2').classList.remove('rolling');
        document.getElementById('dice1').innerText = r1;
        document.getElementById('dice2').innerText = r2;

        if (isDouble) {
            doubleCount++;
            document.getElementById('status-bar').innerText = `دبل! (${doubleCount})`;
            if (doubleCount === 3) {
                alert("رميت دبل 3 مرات متتالية! اذهب إلى السجن فوراً.");
                currentPos = 10; // السجن
                updatePawn(currentPos);
                doubleCount = 0;
                isMoving = false;
                return;
            }
        } else {
            doubleCount = 0;
        }

        // تحريك اللاعب
        for (let i = 0; i < (r1 + r2); i++) {
            currentPos = (currentPos + 1) % gameCenters.length;
            updatePawn(currentPos);
            await new Promise(r => setTimeout(r, 400));
        }
        
        showCard(currentPos);
        isMoving = false;

        // تطبيق قاعدة "العب مرة أخرى" إذا كان دبل ولم يذهب للسجن
        if (isDouble) {
            document.getElementById('status-bar').innerText = `حصلت على دبل! العب مرة أخرى.`;
        } else {
            document.getElementById('status-bar').innerText = `توقفت في: ${propertyData[currentPos].name}`;
        }
    }

    window.onload = loadRemoteGame;
</script>
</body>
</html>
