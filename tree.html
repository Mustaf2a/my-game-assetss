<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تجربة EZ-Tree - بدون ضباب</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #87CEEB; }
        #canvas-container { width: 100vw; height: 100vh; }
        .info {
            position: absolute; top: 10px; width: 100%;
            text-align: center; color: white; font-family: sans-serif;
            pointer-events: none; text-shadow: 1px 1px 2px black;
        }
    </style>
</head>
<body>

    <div class="info">اسحب بالماوس لتدوير الشجرة</div>
    <div id="canvas-container"></div>

    <script async src="https://unpkg.com/es-module-shims@1.6.3/dist/es-module-shims.js"></script>
    <script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/",
            "@dgreenheck/ez-tree": "https://unpkg.com/@dgreenheck/ez-tree@1.1.0/build/ez-tree.es.js"
        }
    }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { Tree } from '@dgreenheck/ez-tree';

        // 1. إعداد المشهد (Scene)
        const scene = new THREE.Scene();
        // قمت بتغيير لون الخلفية ليكون سماوي فاتح ليتناسب مع غياب الضباب
        scene.background = new THREE.Color(0x87CEEB); 

        // تم حذف سطر Fog هنا لجعل الرؤية واضحة تماماً للمسافات البعيدة

        // 2. الكاميرا
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(5, 5, 10);

        // 3. المحرك (Renderer)
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        document.getElementById('canvas-container').appendChild(renderer.domElement);

        // 4. الإضاءة
        const hemiLight = new THREE.HemisphereLight(0xffffff, 0x444444, 1);
        scene.add(hemiLight);
        const dirLight = new THREE.DirectionalLight(0xffffff, 1);
        dirLight.position.set(5, 10, 5);
        dirLight.castShadow = true;
        scene.add(dirLight);

        // 5. إضافة أرضية بسيطة
        const ground = new THREE.Mesh(new THREE.PlaneGeometry(100, 100), new THREE.MeshPhongMaterial({ color: 0x348C31 }));
        ground.rotation.x = -Math.PI / 2;
        ground.receiveShadow = true;
        scene.add(ground);

        // 6. إنشاء الشجرة باستخدام EZ-Tree
        const tree = new Tree();
        
        // يمكنك تعديل خصائص الشجرة هنا (Parameters)
        tree.options.seed = Math.floor(Math.random() * 1000);
        tree.options.branch.levels = 3; // عدد تفرعات الأغصان
        
        tree.generate(); // توليد شكل الشجرة
        scene.add(tree);

        // 7. التحكم بالكاميرا بالماوس
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.target.set(0, 2, 0);
        controls.update();

        // 8. تحديث المشهد
        function animate() {
            requestAnimationFrame(animate);
            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        animate();
    </script>
</body>
</html>
