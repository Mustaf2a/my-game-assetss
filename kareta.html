<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الصحراء الجوزية - الطريق المطور</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #1a1a1a; font-family: sans-serif; }
        canvas { display: block; }

        #loading-screen {
            position: absolute;
            width: 100%;
            height: 100%;
            background-color: #1a1a1a;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
            color: #c4a484;
        }
        #loader-bar-container {
            width: 250px;
            height: 8px;
            background: #333;
            border-radius: 10px;
            margin-top: 20px;
            overflow: hidden;
            border: 1px solid #444;
        }
        #loader-bar {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, #ffcc33, #ffa500);
            transition: width 0.4s ease;
        }
        h2 { letter-spacing: 1px; text-shadow: 0 2px 4px rgba(0,0,0,0.5); }
    </style>
</head>
<body>

<div id="loading-screen">
    <h2>جاري بناء العالم وتعبيد الطريق...</h2>
    <div id="loader-bar-container">
        <div id="loader-bar"></div>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/simplex-noise/2.4.0/simplex-noise.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>

<script>
    // 1. إعداد المشهد
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0xd2b48c); // لون سماء صحراوي أكثر دفئاً
    scene.fog = new THREE.FogExp2(0xd2b48c, 0.0015); // إضافة ضباب لزيادة العمق

    const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 4000);
    camera.position.set(100, 50, 150);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(window.devicePixelRatio);
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    document.body.appendChild(renderer.domElement);

    const controls = new THREE.OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.maxPolarAngle = Math.PI / 2.1;
    controls.maxDistance = 1200;

    // 2. الإضاءة
    const ambientLight = new THREE.AmbientLight(0xfff5e1, 0.5);
    scene.add(ambientLight);

    const sunLight = new THREE.DirectionalLight(0xffe0b3, 1.2);
    sunLight.position.set(200, 500, 100);
    sunLight.castShadow = true;
    sunLight.shadow.mapSize.width = 4096;
    sunLight.shadow.mapSize.height = 4096;
    scene.add(sunLight);

    // 3. التضاريس
    const simplex = new SimplexNoise();
    const worldSize = 1200;
    const segments = 150;

    function getTerrainHeight(x, z) {
        const roadWidth = 18; 
        const distFromRoad = Math.abs(x);
        
        // منطقة الطريق مسطحة تماماً
        if (distFromRoad < roadWidth) return 0;

        // تلاشي تدريجي للحواف
        let blend = Math.min(1, (distFromRoad - roadWidth) / 10);
        let h = simplex.noise2D(x * 0.005, z * 0.005) * 20;
        h += simplex.noise2D(x * 0.05, z * 0.05) * 2;
        return h * blend;
    }

    const terrainGeo = new THREE.PlaneGeometry(worldSize, worldSize, segments, segments);
    const posAttr = terrainGeo.attributes.position;
    for (let i = 0; i < posAttr.count; i++) {
        let x = posAttr.getX(i);
        let y = posAttr.getY(i);
        posAttr.setZ(i, getTerrainHeight(x, y));
    }
    terrainGeo.computeVertexNormals();
    const terrainMat = new THREE.MeshStandardMaterial({ color: 0xc4a484, roughness: 1.0 });
    const terrain = new THREE.Mesh(terrainGeo, terrainMat);
    terrain.rotation.x = -Math.PI / 2;
    terrain.receiveShadow = true;
    scene.add(terrain);

    // 4. تصميم الشارع الجمالي (Advanced Road)
    const roadGroup = new THREE.Group();

    // نسيج الطريق (Canvas Texture) لزيادة الواقعية
    function createRoadTexture() {
        const canvas = document.createElement('canvas');
        canvas.width = 512;
        canvas.height = 1024;
        const ctx = canvas.getContext('2d');

        // لون الأساس (أسفلت محروق)
        ctx.fillStyle = '#221a14';
        ctx.fillRect(0, 0, 512, 1024);

        // إضافة حبيبات رملية وتأثيرات
        for(let i=0; i<5000; i++) {
            ctx.fillStyle = `rgba(100, 80, 50, ${Math.random() * 0.2})`;
            ctx.fillRect(Math.random()*512, Math.random()*1024, 2, 2);
        }

        // الخطوط الجانبية (باهتة قليلاً)
        ctx.fillStyle = 'rgba(200, 180, 150, 0.3)';
        ctx.fillRect(10, 0, 5, 1024);
        ctx.fillRect(502, 0, 5, 1024);

        // الخط المتقطع في المنتصف
        ctx.fillStyle = 'rgba(255, 200, 100, 0.4)';
        for(let i=0; i<1024; i+=60) {
            ctx.fillRect(254, i, 4, 30);
        }

        const tex = new THREE.CanvasTexture(canvas);
        tex.wrapS = tex.wrapT = THREE.RepeatWrapping;
        tex.repeat.set(1, 20); // تكرار النسيج على طول الطريق
        return tex;
    }

    const roadGeo = new THREE.PlaneGeometry(30, worldSize);
    const roadMat = new THREE.MeshStandardMaterial({ 
        map: createRoadTexture(),
        roughness: 0.8,
        metalness: 0.1
    });
    const mainRoad = new THREE.Mesh(roadGeo, roadMat);
    mainRoad.rotation.x = -Math.PI / 2;
    mainRoad.position.y = 0.1; // مرتفع قليلاً عن الأرض
    mainRoad.receiveShadow = true;
    scene.add(mainRoad);

    // 5. تحميل الموديلات (الخيام)
    const loadingManager = new THREE.LoadingManager();
    const loaderBar = document.getElementById('loader-bar');
    loadingManager.onProgress = (url, loaded, total) => {
        loaderBar.style.width = (loaded / total * 100) + '%';
    };
    loadingManager.onLoad = () => {
        setTimeout(() => { document.getElementById('loading-screen').style.display = 'none'; }, 1000);
    };

    const loader = new THREE.GLTFLoader(loadingManager);
    const tentColliders = [];
    const placedTentsPos = [];

    function placeTent(model, x, z) {
        const obj = model.clone();
        const y = getTerrainHeight(x, z);
        obj.position.set(x, y, z);
        obj.rotateY(Math.random() * Math.PI);
        obj.traverse(n => { if(n.isMesh) { n.castShadow = true; n.receiveShadow = true; }});
        scene.add(obj);
        tentColliders.push({ center: new THREE.Vector3(x, y, z), radius: 15 });
        placedTentsPos.push({ x, z });
    }

    const url1 = 'https://raw.githubusercontent.com/Mustaf2a/my-game-assetss/main/hi-v1.glb';
    loader.load(url1, (gltf) => {
        const model = gltf.scene;
        model.scale.set(7, 7, 7);
        for(let i=0; i<15; i++) {
            const side = Math.random() > 0.5 ? 1 : -1;
            const x = (40 + Math.random() * 100) * side;
            const z = (Math.random() - 0.5) * (worldSize - 100);
            placeTent(model, x, z);
        }
    });

    // 6. جزيئات الغبار (أكثر كثافة)
    const particleCount = 20000;
    const particlesGeo = new THREE.BufferGeometry();
    const pPos = new Float32Array(particleCount * 3);
    for (let i = 0; i < particleCount; i++) {
        pPos[i*3] = (Math.random()-0.5)*worldSize;
        pPos[i*3+1] = Math.random()*40;
        pPos[i*3+2] = (Math.random()-0.5)*worldSize;
    }
    particlesGeo.setAttribute('position', new THREE.BufferAttribute(pPos, 3));
    const dust = new THREE.Points(particlesGeo, new THREE.PointsMaterial({
        color: 0xeed9b5, size: 0.2, transparent: true, opacity: 0.4
    }));
    scene.add(dust);

    // 7. نظام التصادم
    function handleCollisions() {
        // تصادم الخيام
        tentColliders.forEach(c => {
            const d = camera.position.distanceTo(c.center);
            if (d < c.radius) {
                const dir = new THREE.Vector3().subVectors(camera.position, c.center).normalize();
                camera.position.add(dir.multiplyScalar(c.radius - d));
            }
        });
        // تصادم الأرض
        const h = getTerrainHeight(camera.position.x, camera.position.z);
        if (camera.position.y < h + 6) camera.position.y = h + 6;
    }

    // 8. الحلقة الحركية
    function animate() {
        requestAnimationFrame(animate);
        
        const positions = particlesGeo.attributes.position.array;
        for (let i = 0; i < particleCount; i++) {
            positions[i*3+2] += 0.5; 
            if (positions[i*3+2] > worldSize/2) positions[i*3+2] = -worldSize/2;
        }
        particlesGeo.attributes.position.needsUpdate = true;

        controls.update();
        handleCollisions();
        renderer.render(scene, camera);
    }

    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });

    animate();
</script>
</body>
</html>
