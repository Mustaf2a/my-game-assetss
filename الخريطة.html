<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الصحراء الجوزية - نظام تصادم كامل</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #1a1a1a; font-family: sans-serif; }
        canvas { display: block; }

        /* تنسيق شريط التحميل */
        #loading-screen {
            position: absolute;
            width: 100%;
            height: 100%;
            background-color: #1a1a1a;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
            color: #c4a484;
        }
        #loader-bar-container {
            width: 250px;
            height: 8px;
            background: #333;
            border-radius: 10px;
            margin-top: 20px;
            overflow: hidden;
            border: 1px solid #444;
        }
        #loader-bar {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, #ffcc33, #ffa500);
            transition: width 0.4s ease;
        }
        h2 { letter-spacing: 1px; text-shadow: 0 2px 4px rgba(0,0,0,0.5); }
    </style>
</head>
<body>

<div id="loading-screen">
    <h2>جاري بناء العالم ومنع اختراق الرمال...</h2>
    <div id="loader-bar-container">
        <div id="loader-bar"></div>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/simplex-noise/2.4.0/simplex-noise.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>

<script>
    // 1. إعداد المشهد الأساسي
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0xb0e0e6); 

    const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 4000);
    // وضع الكاميرا في البداية فوق الأرض
    camera.position.set(300, 200, 400);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(window.devicePixelRatio);
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap; 
    document.body.appendChild(renderer.domElement);

    const controls = new THREE.OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true; 
    controls.maxPolarAngle = Math.PI / 2.1; 
    controls.maxDistance = 1200; 

    // 2. الإضاءة المحسنة
    const ambientLight = new THREE.AmbientLight(0xfff5e1, 0.6);
    scene.add(ambientLight);

    const sunLight = new THREE.DirectionalLight(0xffe0b3, 1.5);
    sunLight.position.set(300, 500, 200);
    sunLight.castShadow = true;
    sunLight.shadow.mapSize.width = 4096; 
    sunLight.shadow.mapSize.height = 4096;
    const d = 600;
    sunLight.shadow.camera.left = -d;
    sunLight.shadow.camera.right = d;
    sunLight.shadow.camera.top = d;
    sunLight.shadow.camera.bottom = -d;
    scene.add(sunLight);

    // 3. التضاريس والضجيج (Simplex Noise)
    const simplex = new SimplexNoise();
    const worldSize = 1000; 
    const segments = 200; 
    
    // دالة لحساب الارتفاع عند نقطة معينة
    function getTerrainHeight(x, z) {
        const distFromCenter = Math.abs(x);
        const roadWidth = 15; 
        
        // إذا كانت الإحداثيات على الطريق، الارتفاع صفر
        if (distFromCenter < roadWidth) return 0;

        // حساب ارتفاع التلال بناءً على الضجيج
        let h = simplex.noise2D(x * 0.004, z * 0.004) * 15;
        h += simplex.noise2D(x * 0.08, z * 0.08) * 0.5;
        return h;
    }

    // دالة لحساب اتجاه السطح (Normal) لوضع الأجسام بشكل مائل متناسق
    function getTerrainNormal(x, z) {
        const eps = 0.5;
        const hL = getTerrainHeight(x - eps, z);
        const hR = getTerrainHeight(x + eps, z);
        const hD = getTerrainHeight(x, z - eps);
        const hU = getTerrainHeight(x, z + eps);
        return new THREE.Vector3(hL - hR, 2 * eps, hD - hU).normalize();
    }

    const terrainGeo = new THREE.PlaneGeometry(worldSize, worldSize, segments, segments);
    const posAttr = terrainGeo.attributes.position;
    for (let i = 0; i < posAttr.count; i++) {
        let x = posAttr.getX(i);
        let y = posAttr.getY(i);
        posAttr.setZ(i, getTerrainHeight(x, y));
    }
    terrainGeo.computeVertexNormals();

    const terrainMat = new THREE.MeshStandardMaterial({ color: 0xc4a484, roughness: 1.0 });
    const terrain = new THREE.Mesh(terrainGeo, terrainMat);
    terrain.rotation.x = -Math.PI / 2;
    terrain.receiveShadow = true;
    scene.add(terrain);

    // 4. الطريق
    const roadGeo = new THREE.PlaneGeometry(24, worldSize);
    const roadMat = new THREE.MeshStandardMaterial({ color: 0x2b1d0e, roughness: 0.9 });
    const road = new THREE.Mesh(roadGeo, roadMat);
    road.rotation.x = -Math.PI / 2;
    road.position.y = 0.08; 
    road.receiveShadow = true;
    scene.add(road);

    // 5. إدارة التحميل والخيام
    const loadingManager = new THREE.LoadingManager();
    const loaderBar = document.getElementById('loader-bar');
    loadingManager.onProgress = (url, loaded, total) => {
        loaderBar.style.width = (loaded / total * 100) + '%';
    };
    loadingManager.onLoad = () => {
        setTimeout(() => { document.getElementById('loading-screen').style.display = 'none'; }, 1000);
    };

    const loader = new THREE.GLTFLoader(loadingManager);
    const tentColliders = []; 
    const placedTentsPos = []; 
    const minDistanceBetweenTents = 60; 

    function placeTentCorrectly(model, x, z) {
        const obj = model.clone();
        const terrainY = getTerrainHeight(x, z);
        const normal = getTerrainNormal(x, z);
        
        const box = new THREE.Box3().setFromObject(obj);
        const heightOffset = box.min.y * obj.scale.y;

        obj.position.set(x, terrainY - heightOffset - 0.15, z);
        
        const up = new THREE.Vector3(0, 1, 0);
        obj.quaternion.setFromUnitVectors(up, normal);
        obj.rotateY(Math.random() * Math.PI * 2);
        
        obj.traverse(node => {
            if (node.isMesh) {
                node.castShadow = true;
                node.receiveShadow = true;
            }
        });
        scene.add(obj);

        tentColliders.push({
            center: new THREE.Vector3(x, terrainY, z),
            radius: 12 
        });
        
        placedTentsPos.push({ x: x, z: z });
    }

    const url1 = 'https://raw.githubusercontent.com/Mustaf2a/my-game-assetss/main/hi-v1.glb';
    const url2 = 'https://raw.githubusercontent.com/Mustaf2a/my-game-assetss/main/hi2-v1.glb';

    function smartDistribute(model, count) {
        let attempts = 0;
        let successCount = 0;
        while (successCount < count && attempts < 500) {
            const side = Math.random() > 0.5 ? 1 : -1;
            const x = (45 + Math.random() * 250) * side;
            const z = (Math.random() - 0.5) * (worldSize - 150);
            
            let farEnough = true;
            for (let tent of placedTentsPos) {
                let d = Math.sqrt((x-tent.x)**2 + (z-tent.z)**2);
                if (d < minDistanceBetweenTents) { farEnough = false; break; }
            }

            if (farEnough) {
                placeTentCorrectly(model, x, z);
                successCount++;
            }
            attempts++;
        }
    }

    loader.load(url1, (gltf) => {
        const model = gltf.scene;
        model.scale.set(6, 6, 6);
        smartDistribute(model, 12); 
    });

    loader.load(url2, (gltf) => {
        const model = gltf.scene;
        model.scale.set(6, 6, 6);
        smartDistribute(model, 12); 
    });

    // 6. جزيئات الغبار
    const particleCount = 35000;
    const particlesGeo = new THREE.BufferGeometry();
    const pPos = new Float32Array(particleCount * 3);
    for (let i = 0; i < particleCount; i++) {
        pPos[i*3] = (Math.random()-0.5)*worldSize;
        pPos[i*3+1] = Math.random()*50;
        pPos[i*3+2] = (Math.random()-0.5)*worldSize;
    }
    particlesGeo.setAttribute('position', new THREE.BufferAttribute(pPos, 3));
    const dust = new THREE.Points(particlesGeo, new THREE.PointsMaterial({
        color: 0xd2b48c, size: 0.3, transparent: true, opacity: 0.35
    }));
    scene.add(dust);

    // 7. نظام التصادم المتقدم (أرض + خيام)
    function handleAllCollisions() {
        // --- أولاً: تصادم الخيام (دفع الكاميرا أفقياً) ---
        tentColliders.forEach(collider => {
            const dist = camera.position.distanceTo(collider.center);
            if (dist < collider.radius) {
                const direction = new THREE.Vector3().subVectors(camera.position, collider.center).normalize();
                const pushBack = direction.multiplyScalar(collider.radius - dist);
                camera.position.add(pushBack);
            }
        });

        // --- ثانياً: منع اختراق الأرض (الرمال) ---
        // الحصول على ارتفاع الأرض تحت الكاميرا مباشرة
        const currentTerrainHeight = getTerrainHeight(camera.position.x, camera.position.z);
        const minHeightAboveGround = 5; // المسافة الدنيا المسموحة فوق الرمل

        if (camera.position.y < currentTerrainHeight + minHeightAboveGround) {
            camera.position.y = currentTerrainHeight + minHeightAboveGround;
        }
    }

    // 8. حلقة التحريك المستمرة
    function animate() {
        requestAnimationFrame(animate);
        
        // تحريك الغبار
        const positions = particlesGeo.attributes.position.array;
        for (let i = 0; i < particleCount; i++) {
            positions[i*3+2] += 0.4; 
            if (positions[i*3+2] > worldSize/2) positions[i*3+2] = -worldSize/2;
        }
        particlesGeo.attributes.position.needsUpdate = true;

        // تحديث الضوابط ثم معالجة التصادم لمنع أي اختراق ناتج عن حركة الماوس
        controls.update();
        handleAllCollisions(); 

        renderer.render(scene, camera);
    }

    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });

    animate();
</script>
</body>
</html>
